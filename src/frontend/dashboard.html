<!DOCTYPE html>
<html>
<head>
<title>EduTrack</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
}

/* Popup background */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Popup box */
.popup {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    animation: scaleUp 0.4s ease;
}

/* Button */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}

/* Animation */
@keyframes scaleUp {
    from {
        transform: scale(0.5);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>

</head>

<body>

<div class="overlay">
    <div class="popup">
        <h2>Welcome to EduTrack 🎉</h2>
        <p>Login Successful</p>

        <button onclick="logout()">Logout</button>
    </div>
</div>

<script>
function logout() {
    window.location.href = "auth.html";
}
</script>

</body>
</html>
